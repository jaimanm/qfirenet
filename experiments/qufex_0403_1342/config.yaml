# QuFeX Qu-Net bottleneck (SWIR + aerosol, mode 5)
# Jain & Kalev (2025) — angle-embedding U1/U2 circuit at the bottleneck
# Mirrors classical_baseline.yaml; only model, quantum, and experiment fields differ.

model: qufex_unet
mode: 5 # swir_aerosol
n_classes: 2

# Quantum bottleneck
n_qubits: 8 # must be even (U1/U2 split); paper configs: 8(1) or 4(2)
n_layers: 2 # trainable RY/RZ rotation layers inside QuFeX
circuit: qufex

# Training
epochs: 5
batch_size: 16
test_batch_size: 50
val_batch_size: 1
learning_rate: 1.0e-4
weight_decay: 5.0e-4
seed: 1234

# Loss
loss: cross_entropy
fire_class_weight: 10

# Data
data_dir: ../Sen2Fire/
train_list: ./dataset/train.txt
val_list: ./dataset/val.txt
test_list: ./dataset/test.txt

# Output
experiment_name: qufex
